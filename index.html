<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Support Chatbot</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="logo">
                <i class="fas fa-headset"></i>
                <h2>SupportBot</h2>
            </div>
            <div class="header-actions">
                <button id="theme-toggle" class="icon-btn">
                    <i class="fas fa-moon"></i>
                </button>
                <button id="minimize-btn" class="icon-btn">
                    <i class="fas fa-minus"></i>
                </button>
                <button id="close-btn" class="icon-btn">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </div>
        
        <div class="chat-messages" id="chat-messages">
            <div class="message bot-message">
                <div class="message-avatar">
                    <i class="fas fa-robot"></i>
                </div>
                <div class="message-content">
                    <p>Hello! I'm your virtual assistant. How can I help you today?</p>
                </div>
            </div>
        </div>
        
        <div class="chat-input-container">
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="Type your message here..." autocomplete="off">
                <button id="send-btn" class="send-btn">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
            <div class="quick-actions">
                <button class="quick-action-btn" data-message="Where is my order?">
                    <i class="fas fa-truck"></i> Order Status
                </button>
                <button class="quick-action-btn" data-message="How do I return an item?">
                    <i class="fas fa-undo"></i> Returns
                </button>
                <button class="quick-action-btn" data-message="Talk to a human agent">
                    <i class="fas fa-user-tie"></i> Human Agent
                </button>
            </div>
        </div>
        
        <div class="typing-indicator" id="typing-indicator">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>

    <div class="chat-widget" id="chat-widget">
        <button id="open-chat-btn">
            <i class="fas fa-comments"></i>
            <span>Support</span>
        </button>
    </div>

    <script src="script.js"></script>
</body>
                  </html>
